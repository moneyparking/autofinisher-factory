<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>affirmation_drop_01</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    html, body {
      width: 2160px;
      height: 3840px;
    }
    body {
      background-color: #0A0A0A;
      color: #FF4500;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      overflow: hidden;
    }
    .headline-wrap {
      width: 90%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 25vw;
      line-height: 0.85;
      text-transform: uppercase;
      margin: 0;
      letter-spacing: -2px;
      color: #FF4500;
      text-shadow: 0 0 10px #FF4500, 0 0 40px #FF0000;
    }
  </style>
</head>
<body>
  <div class="headline-wrap">
    <h1><span class="hl">YOU'RE</span><br/><span class="pink">ABSOLUTELY</span><br/><span class="hot">RIGHT!</span></h1>
  </div>
</body>
</html>
