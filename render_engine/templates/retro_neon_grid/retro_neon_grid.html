<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-color: #ff3300;
            --bg-color: #050505;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: "Space Mono", monospace;
            display: flex; flex-direction: column;
            color: rgba(255,255,255,0.5);
            /* Сетка и шум для премиальности */
            background-image: 
                linear-gradient(rgba(255, 51, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 51, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .noise {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E");
            pointer-events: none; z-index: 1;
        }
        .header, .footer {
            display: flex; justify-content: space-between;
            padding: 40px 60px; font-size: 14px; text-transform: uppercase;
            letter-spacing: 2px; z-index: 2; border-bottom: 1px solid rgba(255,51,0,0.1);
        }
        .footer { border-bottom: none; border-top: 1px solid rgba(255,51,0,0.1); margin-top: auto; }
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2;
        }
        h1 {
            font-family: "Anton", sans-serif;
            font-size: 18vw; line-height: 0.85; text-align: center;
            margin: 0; color: #fff; text-transform: uppercase;
            /* Настоящий эффект неоновых трубок */
            text-shadow: 
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px var(--neon-color),
                0 0 80px var(--neon-color),
                0 0 120px var(--neon-color);
        }
        .subtitle {
            margin-top: 40px; font-size: 20px; letter-spacing: 5px;
            color: var(--neon-color); text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="header">
        <span>Autofinisher Factory</span>
        <span>Premium Drop 01</span>
    </div>
    <div class="main-content">
        <h1>YOU'RE<br>ABSOLUTELY<br>RIGHT!</h1>
        <div class="subtitle">Statement Series // 2026</div>
    </div>
    <div class="footer">
        <span>Code: AF-001</span>
        <span>Rendered on VPS</span>
    </div>
</body>
</html>
